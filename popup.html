<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raja Control Center</title>
    <style>
        /* एकदम डार्क और निऑन हैकर लुक */
        body {
            width: 320px;
            background-color: #050505;
            color: #00ffcc;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 15px;
            border: 2px solid #333;
        }

        h2 {
            font-size: 18px;
            text-align: center;
            color: #fff;
            text-shadow: 0 0 10px #00ffcc;
            border-bottom: 1px dashed #00ffcc;
            padding-bottom: 10px;
            margin-top: 0;
            letter-spacing: 2px;
        }

        .status-box {
            background: rgba(0, 255, 204, 0.05);
            padding: 15px;
            border: 1px solid #00ffcc;
            margin-bottom: 15px;
            text-align: center;
            border-radius: 3px;
            box-shadow: inset 0 0 10px rgba(0, 255, 204, 0.1);
        }

        .status-text {
            color: #00ff00;
            font-weight: bold;
            font-size: 16px;
            animation: pulse 1.5s infinite;
        }

        .stats {
            font-size: 12px;
            color: #aaa;
            margin-top: 10px;
            display: block;
        }

        .btn {
            display: block;
            width: 100%;
            background: #000;
            color: #00ffcc;
            border: 1px solid #00ffcc;
            padding: 12px;
            margin-bottom: 10px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            text-transform: uppercase;
            transition: all 0.3s;
        }

        .btn:hover {
            background: #00ffcc;
            color: #000;
            box-shadow: 0 0 15px #00ffcc;
        }

        .btn-danger {
            border-color: #ff003c;
            color: #ff003c;
        }

        .btn-danger:hover {
            background: #ff003c;
            color: #fff;
            box-shadow: 0 0 15px #ff003c;
        }

        /* छोटे विज्ञापन के लिए जगह */
        .mini-ad-space {
            text-align: center;
            font-size: 10px;
            color: #ff4500;
            padding: 10px;
            border: 1px dashed #ff4500;
            margin-top: 15px;
            background: #111;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>

    <h2>🔱 RAJA PRO PANEL</h2>
    
    <div class="status-box">
        System Shield: <br><span class="status-text">ACTIVE & SECURE 🛡️</span>
        <span class="stats">Ads & Trackers Blocked: <span id="blockCount" style="color:#fff; font-weight:bold;">0</span></span>
    </div>

    <!-- बटन्स -->
    <button class="btn" id="openDashboardBtn">🎛️ Open Dashboard</button>
    <button class="btn btn-danger" id="quickBurnBtn">🔥 Quick Data Burn</button>

    <!-- 💸 MONEY HOOK: यहाँ अपना छोटा 300x50 का Adsterra Banner लगा सकते हो -->
    <div class="mini-ad-space">
        <span>⚡ SYSTEM SPONSOR ⚡</span>
        <!-- Paste your Native Banner Adsterra code here -->
        <br>
        <a href="YOUR_AFFILIATE_LINK" target="_blank" style="color: #fff; text-decoration: none; font-size: 12px; margin-top: 5px; display: inline-block;">Unlock Premium AI Features</a>
    </div>

    <script src="popup.js"></script>
</body>
</html>
