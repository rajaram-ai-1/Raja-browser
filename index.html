<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raja Browser Pro - Command Center</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- 💰 MONEY MACHINE: यहाँ Adsterra का विज्ञापन चलेगा -->
    <!-- यह पट्टी कभी ब्लॉक नहीं होगी और हर बार नया टैब खुलने पर आपको पैसा देगी -->
    <div id="raja-ad-layer" class="ad-layer">
        <!-- भाई, अपना Adsterra का 728x90 Banner Code ठीक इसके नीचे पेस्ट करना -->
        <span class="ad-placeholder-text">SYSTEM AD LAYER ACTIVE [Paste Adsterra Code Here]</span>
    </div>

    <!-- 🔱 मुख्य ब्राउज़र UI (डार्क हैकर लुक) -->
    <div class="cyber-container">
        
        <!-- लोगो -->
        <div class="logo-box">
            <h1 class="glitch-title">RAJA <span class="pro-tag">PRO</span></h1>
            <p class="status-text">⚡ System Online | 🛡️ Shields Active</p>
        </div>

        <!-- स्मार्ट सर्च बार (जिसमें AI बटन जुड़ा है) -->
        <div class="search-wrapper">
            <span class="search-icon">🔱</span>
            <input type="text" id="centerUrlInput" placeholder="Enter target URL or ask AI..." autocomplete="off">
            <button class="ai-trigger-btn" id="aiModeBtn">✨ Ask AI</button>
        </div>

        <!-- 💸 AFFILIATE HOOKS (डबल कमाई का जाल) -->
        <!-- यहाँ अपने अमेज़न के एफिलिएट लिंक्स लगाना, एक सेल पर 200-500 रुपये कमीशन! -->
        <div class="shortcut-grid">
            <a href="YOUR_AMAZON_LAPTOP_LINK" target="_blank" class="cyber-btn">
                <span class="btn-icon">💻</span> Best Laptops
            </a>
            <a href="YOUR_AMAZON_BOOKS_LINK" target="_blank" class="cyber-btn">
                <span class="btn-icon">📚</span> 10th Notes
            </a>
            <a href="YOUR_GADGET_LINK" target="_blank" class="cyber-btn">
                <span class="btn-icon">🎧</span> Cool Gadgets
            </a>
            <button class="cyber-btn data-burn-btn" id="burnDataBtn">
                <span class="btn-icon">🔥</span> Burn Data
            </button>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
