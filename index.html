<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Tab</title>
    <style>
        /* क्रोम जैसा डार्क मोड CSS */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #202124; /* क्रोम का असली डार्क ग्रे रंग */
            color: white;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* टॉप राइट कॉर्नर (Gmail, Images, Profile) */
        .top-right {
            position: absolute;
            top: 15px;
            right: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 13px;
        }
        .top-right a {
            color: white;
            text-decoration: none;
        }
        .top-right a:hover {
            text-decoration: underline;
        }
        .profile-icon {
            width: 32px;
            height: 32px;
            background: #8ab4f8;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: black;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
        }

        /* सेंटर लेआउट (Logo और Search Bar) */
        .center-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1;
            margin-top: -50px;
        }

        /* क्रोम लोगो स्टाइल */
        .logo {
            font-size: 85px;
            font-weight: bold;
            margin-bottom: 30px;
            letter-spacing: -3px;
        }
        .logo span:nth-child(1) { color: #4285f4; } /* G (Blue) */
        .logo span:nth-child(2) { color: #ea4335; } /* o (Red) */
        .logo span:nth-child(3) { color: #fbbc05; } /* o (Yellow) */
        .logo span:nth-child(4) { color: #4285f4; } /* g (Blue) */
        .logo span:nth-child(5) { color: #34a853; } /* l (Green) */
        .logo span:nth-child(6) { color: #ea4335; } /* e (Red) */

        /* क्रोम जैसा सर्च बार */
        .search-bar {
            width: 580px;
            height: 46px;
            background: #303134;
            border-radius: 24px;
            display: flex;
            align-items: center;
            padding: 0 20px;
            border: 1px solid #5f6368;
        }
        .search-bar:hover, .search-bar:focus-within {
            background: #3c4043;
            box-shadow: 0 1px 6px rgba(0,0,0,0.3);
        }
        .search-bar input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            font-size: 16px;
            outline: none;
            margin-left: 15px;
        }

        /* शॉर्टकट्स (Shortcuts Grid) */
        .shortcuts {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }
        .shortcut {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            padding: 10px;
            border-radius: 8px;
            width: 80px;
            transition: background 0.2s;
        }
        .shortcut:hover {
            background: #303134;
        }
        .shortcut-icon {
            width: 48px;
            height: 48px;
            background: #2b2b2b;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <!-- क्रोम का टॉप राइट मेनू -->
    <div class="top-right">
        <a href="#">Gmail</a>
        <a href="#">Images</a>
        <div style="font-size: 18px; cursor: pointer; padding-bottom: 5px;">⋮⋮⋮</div>
        <div class="profile-icon">R</div>
    </div>

    <!-- मेन डिस्प्ले एरिया जहाँ सब कुछ दिखेगा -->
    <div id="displayArea" style="width: 100%; height: 100%; display: flex; flex-direction: column;">
        
        <!-- होम स्क्रीन (सेंटर वाला हिस्सा) -->
        <div class="center-box" id="homeScreen">
            
            <!-- Google Logo -->
            <div class="logo">
                <span>G</span><span>o</span><span>o</span><span>g</span><span>l</span><span>e</span>
            </div>
            
            <!-- असली दिखने वाला सर्च बार -->
            <div class="search-bar">
                <span style="color: #9aa0a6;">🔍</span>
                <input type="text" id="centerUrlInput" placeholder="Search Google or type a URL" autocomplete="off">
                <span style="cursor: pointer; margin-right: 15px;" title="Voice search">🎙️</span>
                <span style="cursor: pointer;" title="AI Mode">🪄</span>
            </div>

            <!-- शॉर्टकट्स -->
            <div class="shortcuts">
                <div class="shortcut" onclick="alert('Opening Amazon...')">
                    <div class="shortcut-icon">🛒</div>
                    <span style="font-size: 13px; color: #e8eaed;">Amazon</span>
                </div>
                <div class="shortcut" onclick="alert('Opening Flipkart...')">
                    <div class="shortcut-icon">🛍️</div>
                    <span style="font-size: 13px; color: #e8eaed;">Flipkart</span>
                </div>
                <div class="shortcut">
                    <div class="shortcut-icon" style="font-size: 24px; font-weight: bold; color: #e8eaed;">+</div>
                    <span style="font-size: 13px; color: #e8eaed;">Add shortcut</span>
                </div>
            </div>
        </div>

        <!-- वेब व्यू (जब आप कुछ सर्च करेंगे तो वह इस फ्रेम में खुलेगा) -->
        <iframe id="webFrame" style="display: none; width: 100%; flex: 1; border: none;"></iframe>
    </div>

    <script src="script.js"></script>
</body>
</html>
